name: Daily Java/Spring Tip Update

on:
  schedule:
    - cron: '0 0 * * *'  # Runs at midnight UTC daily
  workflow_dispatch:  # Allows manual trigger

jobs:
  update-tip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Update README with daily tip
        run: |
          # Get today's date in YYYY-MM-DD format
          TODAY=$(date -u +%Y-%m-%d)
          
          # Extract tip for today from tips.json
          TIP=$(jq -r ".[] | select(.date == \"$TODAY\") | .tip" tips.json)
          TOPIC=$(jq -r ".[] | select(.date == \"$TODAY\") | .topic" tips.json)
          
          # If no tip for today, use the first tip
          if [ -z "$TIP" ]; then
            TIP=$(jq -r '.[0].tip' tips.json)
            TOPIC=$(jq -r '.[0].topic' tips.json)
          fi
          
          # Update README.md
          cat > README.md << EOF
# Daily Java/Spring Tip

### Tip for $TODAY
**Topic:** $TOPIC

$TIP

---

## 📚 About This Project

This project helps you learn Java and Spring Framework with daily tips!

### Instructions

1. **Clone the repository**: \`git clone https://github.com/shamnaz009/java-spring-learning\`
2. **Navigate to the project directory**: \`cd java-spring-learning\`
3. **View today's tip**: Check the README.md for today's learning topic
4. **Add your own tips**: Edit \`tips.json\` to add more learning tips

### How It Works
- A new tip appears automatically every day at midnight UTC
- Tips are sourced from \`tips.json\`
- The README updates automatically via GitHub Actions

Happy Learning! 🎓
EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Update daily tip for $(date -u +%Y-%m-%d)" || echo "No changes to commit"
          git push
